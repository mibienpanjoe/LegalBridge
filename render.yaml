services:
  - type: web
    name: legalbridge-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: legalbridge-db
          property: connectionString
      - key: EMBEDDING_PROVIDER
        value: huggingface
      - key: LLM_PROVIDER
        value: groq
      - key: HF_API_KEY
        sync: false          # set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: CORS_ALLOWED_ORIGIN
        sync: false          # set to your Vercel frontend URL after it deploys

databases:
  - name: legalbridge-db
    plan: free
    databaseName: legalbridge
